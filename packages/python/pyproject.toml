[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "contextcompany"
version = "1.9.0"
description = "The Context Company AI Agent Observability SDK for Python"
readme = "README.md"
requires-python = ">=3.9"
license = {text = "MIT"}
authors = [
    {name = "The Context Company", email = "support@thecontextcompany.com"},
]
keywords = ["observability", "ai", "agents", "llm", "tracing", "monitoring"]
classifiers = [
    "Development Status :: 4 - Beta",
    "Intended Audience :: Developers",
    "License :: OSI Approved :: MIT License",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.9",
    "Programming Language :: Python :: 3.10",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Programming Language :: Python :: 3.13",
    "Topic :: Software Development :: Libraries :: Python Modules",
    "Topic :: System :: Monitoring",
]
dependencies = [
    "requests>=2.31.0",
]

[project.optional-dependencies]
litellm = [
    "litellm",
    "opentelemetry-sdk>=1.29.0",
    "opentelemetry-exporter-otlp-proto-http>=1.29.0",
]
langchain = [
    "opentelemetry-api>=1.29.0",
    "opentelemetry-sdk>=1.29.0",
    "opentelemetry-exporter-otlp>=1.29.0",
    "opentelemetry-instrumentation-langchain>=0.47.3",
]
agno = [
    "openinference-instrumentation-agno>=0.1.0",
    "opentelemetry-api>=1.29.0",
    "opentelemetry-sdk>=1.29.0",
    "opentelemetry-exporter-otlp-proto-http>=1.29.0",
]
crewai = [
    "crewai>=0.70.0",
    "wrapt>=1.14.0",
]
claude = [
    "claude-agent-sdk>=0.1.0",
]

[project.urls]
Homepage = "https://www.thecontextcompany.com"
Documentation = "https://docs.thecontextcompany.com"
Repository = "https://github.com/The-Context-Company/observatory"
Issues = "https://github.com/The-Context-Company/observatory/issues"
Changelog = "https://github.com/The-Context-Company/observatory/blob/main/packages/python/CHANGELOG.md"

[tool.hatch.build.targets.wheel]
packages = ["contextcompany"]

# ── Semantic Release ──────────────────────────────────────────────
[tool.semantic_release]
branch = "main"
tag_format = "python-v{version}"
commit_message = "chore(python-release): {version}"
major_on_zero = false
commit_parser = "scope_parser:PythonScopeParser"
version_toml = ["pyproject.toml:project.version"]
version_variables = ["contextcompany/__init__.py:__version__"]

[tool.semantic_release.commit_parser_options]
allowed_tags = ["feat", "fix", "perf", "refactor", "docs", "test", "chore", "build", "ci", "style"]
minor_tags = ["feat"]
patch_tags = ["fix", "perf"]

[tool.semantic_release.remote]
type = "github"
token = { env = "GH_TOKEN", default = "" }

[tool.semantic_release.changelog.default_templates]
changelog_file = "CHANGELOG.md"
